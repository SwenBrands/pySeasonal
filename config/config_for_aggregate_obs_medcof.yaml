---

obs: 'era5' #name of the observational / reanalysis dataset that will be regridded: 'era5', 'PTI-grid-v2'
agg_src: 'mon' #'day' or 'mon': temporal aggregation of the observational input files, pertains to the <obs> loop indicated with <oo> below
startyears_file: [1940, 1940, 1940, 1981, 1940, 1981, 1981, 1940, 1940, 1940, 1940, 1940, 1940, 1940, 1940, 1940, 1940, 1940, 1940, 1940, 1940] #start year of the obs file as indicated in filename
endyears_file: [2024, 2024, 2024, 2024, 2024, 2022, 2022, 2024, 2024, 2024, 2024, 2024, 2024, 2024, 2024, 2024, 2024, 2024, 2024, 2024, 2024] #corresponding end year as indicated in filename
startyears_aggregation: [1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981, 1981] #start years to be aggregated
endyears_aggregation: [2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022, 2022] #end years to be aggregated
variables: ['SPEI-3','PVPOTm','fwi','FWIm','DD','CGDD_S','CGDD_W','SU','FD','ID','pet-hargreaves','PRm','Rx1day','Rx5day','SSRDm','TR','Tm','TNm','TXm','UAI','WSm'] #variables to be regridded
variables_nc: ['SPEI-3','PVPOTm','FWI','FWIm','DD','CGDD_S','CGDD_W','SU','FD','ID','pet-hargreaves','PRm','Rx1day','Rx5day','SSRDm','TR','Tm','TNm','TXm','UAI','WSm'] #variable names with the netCDF file

domain: 'medcof' #spatial domain the model data is available on. So far, this is just a label used in the output filename
domain_label: 'medcof' #domain label used in file name; <domain_label> is added for consistency with the config files for Iberia and Canarias, whose domain label within the file name is not consistent with the folder the file has been stored in ("pen" for "Iberia" and "can" for "Canarias") 
resolution: '1degree' #resolution shortcut used in the input variable names

grid_name: 'ecmwf51' #here used as label to save the output netcdf file: ecmwf51 for 1 degree datasets, PTI-grid-v2 for downscaled datasets
int_method: 'conservative_normed' #here used as label to save the output netcdf file, ask Adri if this method was used, 'conservative_normed' or 'upscaled'

paths:
  home: '/lustre/gmeteo/PTICLIMA'
  path_obs_base: 'DATA/REANALYSIS' #base path upon which the final path to the obs data is constructed
  savepath_base: 'Results/seasonal/obs/regridded' #This is the common directory for regridded monthly observations; what is placed here will be processed by get_skill_season.py
  rundir: 'Scripts/SBrands/pyPTIclima/pySeasonal' #The run directory