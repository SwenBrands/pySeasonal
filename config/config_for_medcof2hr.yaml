---

# Configuration for medcof2hr.py and interpolation from medcof to Iberia domain

#set path to input gcm files
paths:
  home: '/lustre/gmeteo/PTICLIMA'
  rundir: 'Scripts/SBrands/pyPTIclima/pySeasonal'
  dir_netcdf: 'Results/seasonal/validation' #directory of the output netcdf files written by medcof2hr.py
  dir_telcon: 'Results/seasonal/indices' #directory of the netCDF file containing the phases of known teleconnection indices; currently ENSO only, as generated with oni2enso.py
  mask_dir: 'Auxiliary-material/Masks' # path to the land-sea masks on lustre
    
# Input parameters for get_skill_season.py
input_parameters:
  vers: 'v1r'
  interp_method: 'linear'
  # models: ['ecmwf','eccc','dwd','cmcc'] #models to be assessed
  models: ['ecmwf51'] #models to be assessed
  obs: 'era5' # character string defining the observational dataset in use.
  precision: 'float32' # data type of the variables in the output netcdf files
  compression_level: 1
  bin_edges_reliability: null # probability edges used to calculate the reliability, either <None> in which case the default of xs.reliability() is used (currently 5 bins) or, which should return the same, manually pass 5 bins with np.linspace(0, 1, 6); or 3 bins with np.linspace(0, 1, 4)
  domain: 'medcof' # spatial domain
  int_method: 'conservative_normed' # 'conservative_normed', interpolation method used before in <regrid_obs.py>
  quantiles: [0.3333333333333333, 0.6666666666666666] # quantiles of the year-to-year time series to be calculated and stored
  detrending: ['yes', 'no'] # yes or no, linear detrending of the gcm and obs time series prior to validation
  agg_labels: ['1mon', '2mon'] #list of strings used to defined the aggregation period in the output files generated by this script; the length of this list defines the number of aggregation windows
  modulators: ['enso','none'] # list containing modulators climate oscillation assumed to modulate the verification results; currently: "enso" or "none" 
  phases: ['0','none'] #changed to string format for all entries in the new version
  masked_variables_std: ['GDD_S', 'GDD_W', 'fwi', 'pvpot', 'SPEI-3-M', 'tp', 'ssrd', 'si10', 't2m', 'msl']
  filename_telcon: 'oni2enso_195001_202505.nc' #name of the file located in <dir_telcon>
  nr_prob_thresholds: 60 #mumber of probability thresholds used to calculate ROC AUC

# Set the lead-times for each model and version thereof, as well as for each aggregation window (currently 1 and 3 months)

######################################################################################################################################
model_settings:
  ecmwf51: # ECMWF SEAS5.1
    years_mod: [1981, 2022] # list containing the start and end years of the verification period for this model; refers to the first and the last year of the monthly model inits; may contain the combined hindcasts and forecasts; years must coincide with the years indicated in the name of model netCDF file generated by aggregate_hindcast.py
    years_obs: [1981, 2022] # list containing the start and end years of the verification period for this model; refers to the first and the last year of the monthly model inits; may contain the combined hindcasts and forecasts; years must coincide with the years indicated in the name of model netCDF file generated by aggregate_hindcast.py
    variables_mod: ['GDD_S', 'GDD_W', 'fwi', 'pvpot', 'SPEI-3-M', 'tp', 'ssrd', 'si10', 't2m', 'msl']
    variables_obs: ['GDD_S', 'GDD_W', 'fwi', 'pvpot', 'SPEI-3-M', 'tp', 'ssrd', 'si10', 't2m', 'msl']

  cmcc35: # CMCC-SPS3.5 (System 35 in CDS)
    years_mod: [1993, 2022] # list containing the start and end years of the verification period for this model; refers to the first and the last year of the monthly model inits; may contain the combined hindcasts and forecasts; years must coincide with the years indicated in the name of model netCDF file generated by aggregate_hindcast.py
    years_obs: [1993, 2022] # list containing the start and end years of the verification period for this model; refers to the first and the last year of the monthly model inits; may contain the combined hindcasts and forecasts; years must coincide with the years indicated in the name of model netCDF file generated by aggregate_hindcast.py
    variables_mod: ['GDD_S', 'GDD_W', 'fwi', 'pvpot', 'SPEI-3-M', 'tp', 'ssrd', 'si10', 't2m', 'msl']
    variables_obs: ['GDD_S', 'GDD_W', 'fwi', 'pvpot', 'SPEI-3-M', 'tp', 'ssrd', 'si10', 't2m', 'msl']

  cmcc4: # CMCC-SPS4 (System 4 in CDS)
    years_mod: [1993, 2022] # list containing the start and end years of the verification period for this model; refers to the first and the last year of the monthly model inits; may contain the combined hindcasts and forecasts; years must coincide with the years indicated in the name of model netCDF file generated by aggregate_hindcast.py
    years_obs: [1993, 2022] # list containing the start and end years of the verification period for this model; refers to the first and the last year of the monthly model inits; may contain the combined hindcasts and forecasts; years must coincide with the years indicated in the name of model netCDF file generated by aggregate_hindcast.py
    variables_mod: ['GDD_S', 'GDD_W', 'fwi', 'pvpot', 'SPEI-3-M', 'tp', 'ssrd', 'si10', 't2m', 'msl']
    variables_obs: ['GDD_S', 'GDD_W', 'fwi', 'pvpot', 'SPEI-3-M', 'tp', 'ssrd', 'si10', 't2m', 'msl']

  dwd22: # DWD GCFS2.2 (System 22 in CDS)
    years_mod: [1993, 2022] # list containing the start and end years of the verification period for this model; refers to the first and the last year of the monthly model inits; may contain the combined hindcasts and forecasts; years must coincide with the years indicated in the name of model netCDF file generated by aggregate_hindcast.py
    years_obs: [1993, 2022] # list containing the start and end years of the verification period for this model; refers to the first and the last year of the monthly model inits; may contain the combined hindcasts and forecasts; years must coincide with the years indicated in the name of model netCDF file generated by aggregate_hindcast.py
    variables_gcm: ['GDD_S', 'GDD_W', 'fwi', 'pvpot', 'SPEI-3-M', 'tp', 'ssrd', 'si10', 't2m', 'msl']
    variables_obs: ['GDD_S', 'GDD_W', 'fwi', 'pvpot', 'SPEI-3-M', 'tp', 'ssrd', 'si10', 't2m', 'msl']

  eccc5: # ECCC System 5, based on the CanESM5.1p1bc atmosphere and terrestial ecosystem coupled model, see https://confluence.ecmwf.int/display/CKB/Description+of+CanESM5.1p1bc-v20240611+C3S+contribution
    years_mod: [1993, 2022] # list containing the start and end years of the verification period for this model; refers to the first and the last year of the monthly model inits; may contain the combined hindcasts and forecasts; years must coincide with the years indicated in the name of model netCDF file generated by aggregate_hindcast.py
    years_obs: [1993, 2022] # list containing the start and end years of the verification period for this model; refers to the first and the last year of the monthly model inits; may contain the combined hindcasts and forecasts; years must coincide with the years indicated in the name of model netCDF file generated by aggregate_hindcast.py
    variables_gcm: ['GDD_S', 'GDD_W', 'fwi', 'pvpot', 'SPEI-3-M', 'tp', 'ssrd', 'si10', 't2m', 'msl']
    variables_obs: ['GDD_S', 'GDD_W', 'fwi', 'pvpot', 'SPEI-3-M', 'tp', 'ssrd', 'si10', 't2m', 'msl']

######################################################################################################################################