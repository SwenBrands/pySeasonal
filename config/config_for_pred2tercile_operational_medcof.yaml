---

# This is the configuration file defining a number of variables used in <pred2tercile_operational.py> '''

## SET INPUT PARAMETERS ################################################

# models: ['ecmwf','eccc','dwd','cmcc'] #models to be assessed
# version: ['51','5','22','4'] # version of these models

# models: ['eccc','ecmwf'] #models to be assessed
# version: ['5','51'] # version of these models

models: ['ecmwf'] #models to be assessed
version: ['51'] # version of these models

quantile_version: 'v1r' #version of the validation results

# agg_label: ['1mon','2mon','3mon','4mon','5mon'] # ['1mon','3mon'] list of strings used to label to aggregation period in the output files generated by this script; the length of this list defines the number of aggregation windows
agg_label: ['3mon'] # ['1mon','3mon'] list of strings used to label to aggregation period in the output files generated by this script; the length of this list defines the number of aggregation windows

lon_name_out: 'x' #longitude name in the output files
lat_name_out: 'y' #latitude name in the output files
plot_figs: 'yes' #plot output figures showing the tercile probabilities, yes or no
smooth_prob: 'no' #smooth the tercile probabilities with a Gaussian filter

precip_threshold_quotient: 30 #quotient to calculate seasonal mean daily precipitation threshold in mm below which the modelled and quasi-observed monthly precipitation amount is set to 0. Bring this in exact agreement with get_skill_season.py in future versions
datatype: 'float32' #data type of the variables in the output netcdf files
domain: 'medcof' #spatial domain
medcof2hr: 'no' #no, Iberia or Canarias. Option to interpolate the forecasted values on the medcof grid to the high resoulution (hr) observational grids developed in the PTI Clima project; in pred2tercile.py, this parameter is only loaded in case domain == 'medcof'
# interp_method: 'linear' #linear, nearest, cubic and more; interpolation method to be used, this parameter is only loaded in case domain == 'medcof'; see https://docs.xarray.dev/en/latest/generated/xarray.DataArray.interp.html
# variable_out_label: 'i1' #only used in case domain == 'medcof' and mecof2hr in ('Iberia','Canarias=; label to be added to the variable name set in <variables_mod> (see below) to generate the output variable name
  
# masked_variables_std: ['pvpot','SPEI-3-M','fwi','msl','t2m','tp','si10','ssrd'] #list of variables on which a land-sea mask will be applied, setting values over sea to nan
masked_variables_std: ['pvpot','SPEI-3-M','fwi','t2m','tp','si10','ssrd'] #list of variables on which a land-sea mask will be applied, setting values over sea to nan
detrended: 'no' #yes or no, linear detrending of the gcm and obs time series prior to validation
nr_mem: [25] #considered ensemble members, not yet in use !
product: 'forecast'
quantile_threshold: [0.33,0.67]

#set path to input gcm files
paths:
  home: '/lustre/gmeteo/PTICLIMA'
  path_gcm_base: 'DATA/SEASONAL/seasonal-original-single-levels' # head directory of the source files
  path_gcm_base_derived: 'DATA/SEASONAL/seasonal-original-single-levels_derived' # head directory of the source files
  path_gcm_base_masked: 'DATA/SEASONAL/seasonal-original-single-levels_masked' # head directory of the source files
  dir_quantile: 'Results/seasonal/validation'
  dir_forecast: 'Results/seasonal/forecast'
  mask_dir: 'Auxiliary-material/Masks' #path to the land-sea masks

# Parameters per model
model_settings:
  ## CURRENTLY OPERATIVE MODELS ############################################
  cmcc4: #configuration for cmcc4
    variable_std: ['msl','t2m','tp','si10','ssrd'] # standard model variable names used by the pySeasonal package. Here used to load the quantile threshold files and to write the output netCDF files generated by this script
    variable_fc: ['psl','tas','pr','sfcWind','rsds'] # variable name used in the file name, i.e. outside the file, ask collegues for data format harmonization
    variable_fc_nc: ['psl','tas','pr','sfcWind','rsds'] # variable name within the model netcdf file, may vary depending on source
    time_name: ['forecast_time','forecast_time','forecast_time','forecast_time','forecast_time'] #name of the time dimension within the model netcdf file, may vary depending on source
    lon_name: [x','x','x','x','x']
    lat_name: ['y','y','y','y','y']
    file_start: ['seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels'] #start string of the file names
    years_quantile: [1993,2022] #years used to calculate the quantiles with get_skill_season.py

  dwd22: #configuration for dwd22
    variable_std: ['msl','t2m','tp','si10','ssrd'] # standard model variable names used by the pySeasonal package. Here used to load the quantile threshold files and to write the output netCDF files generated by this script
    variable_fc: ['psl','tas','pr','sfcWind','rsds'] # variable name used in the file name, i.e. outside the file, ask collegues for data format harmonization
    variable_fc_nc: ['psl','tas','pr','sfcWind','rsds'] # variable name within the model netcdf file, may vary depending on source
    time_name: ['forecast_time','forecast_time','forecast_time','forecast_time','forecast_time'] #name of the time dimension within the model netcdf file, may vary depending on source
    lon_name: [x','x','x','x','x']
    lat_name: ['y','y','y','y','y']
    file_start: ['seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels'] #start string of the file names
    years_quantile: [1993,2022] #years used to calculate the quantiles with get_skill_season.py

  eccc5: #configuration for eccc5
    variable_std: ['msl','t2m','tp','si10','ssrd'] # standard model variable names used by the pySeasonal package. Here used to load the quantile threshold files and to write the output netCDF files generated by this script
    variable_fc: ['psl','tas','pr','sfcWind','rsds'] # variable name used in the file name, i.e. outside the file, ask collegues for data format harmonization
    variable_fc_nc: ['psl','tas','pr','sfcWind','rsds'] # variable name within the model netcdf file, may vary depending on source
    time_name: ['forecast_time','forecast_time','forecast_time','forecast_time','forecast_time'] #name of the time dimension within the model netcdf file, may vary depending on source
    lon_name: ['x','x','x','x','x']
    lat_name: ['y','y','y','y','y']
    file_start: ['seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels'] #start string of the file names
    years_quantile: [1993,2022] #years used to calculate the quantiles with get_skill_season.py

  ecmwf51: #configuration for ecmwf51
    variable_std: ['pvpot','SPEI-3-M','fwi','msl','t2m','tp','si10','ssrd'] # standard model variable names used by the pySeasonal package. Here used to load the quantile threshold files and to write the output netCDF files generated by this script
    variable_fc: ['pvpot','SPEI-3-M','fwi','psl','tas','pr','sfcWind','rsds'] # variable name used in the file name, i.e. outside the file, ask collegues for data format harmonization
    variable_fc_nc: ['pvpot','SPEI-3-M','FWI','psl','tas','pr','sfcWind','rsds'] # variable name within the model netcdf file, may vary depending on source
    time_name: ['time','time','time','forecast_time','forecast_time','forecast_time','forecast_time','forecast_time'] #name of the time dimension within the model netcdf file, may vary depending on source
    lon_name: ['lon','lon','lon','x','x','x','x','x']
    lat_name: ['lat','lat','lat','y','y','y','y','y']
    file_start: ['seasonal-original-single-levels','seasonal-original-single-levels_derived','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels'] #start string of the file names
    years_quantile: [1993,2022] #years used to calculate the quantiles with get_skill_season.py

  ## DECOMISSIONED MODELS not producing forecasts any more ############################################
  cmcc35: #configuration for cmcc35, not producing forecasts any more
    variable_std: ['pvpot','SPEI-3-M','fwi','msl','t2m','tp','si10','ssrd'] # standard model variable names used by the pySeasonal package. Here used to load the quantile threshold files and to write the output netCDF files generated by this script
    variable_fc: ['pvpot','SPEI-3-M','fwi','psl','tas','pr','sfcWind','rsds'] # variable name used in the file name, i.e. outside the file, ask collegues for data format harmonization
    variable_fc_nc: ['pvpot','SPEI-3-M','FWI','psl','tas','pr','sfcWind','rsds'] # variable name within the model netcdf file, may vary depending on source
    time_name: ['time','time','time','forecast_time','forecast_time','forecast_time','forecast_time','forecast_time'] #name of the time dimension within the model netcdf file, may vary depending on source
    lon_name: ['lon','lon','lon','x','x','x','x','x']
    lat_name: ['lat','lat','lat','y','y','y','y','y']
    file_start: ['seasonal-original-single-levels','seasonal-original-single-levels_derived','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels','seasonal-original-single-levels'] #start string of the file names
    years_quantile: [1993,2022] #years used to calculate the quantiles with get_skill_season.py
